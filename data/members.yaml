# メンバー一覧 / Member list
#
# Codex: /members ページはこのファイルをループして生成してください（ハードコード禁止）。
#        org ごとにグループ化し、各 org 内は記載順を維持します。
#        photo はプレースホルダーです。実際の写真は後日差し替えます。
#        id は個人ページの member_id と対応します。slug は URL に使います。
#        profile_ja / profile_en を追加すると個人ページに紹介文として表示されます。
#        status は current または alumni。start_month / end_month は YYYY-MM 形式です。
#        current の end_month は空のままにすると「現在 / Present」と表示されます。
#        sort_order は同じ org 内の表示順です。小さいほど上に表示されます。
#
# NOTE (重要): ローマ字表記は一般的な転写です。公式表記・本人希望と
#              異なる場合があるため、公開前に各自に確認してください。
#              特定教授/特定准教授/特定助教 = Program-Specific Professor /
#              Associate Professor / Assistant Professor（京都大学の英語表記に準拠）。

